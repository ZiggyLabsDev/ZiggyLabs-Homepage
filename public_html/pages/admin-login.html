<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — ZiggyLabs Development</title>
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <script>
    const ADMIN_API_BASE_URL = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';

    fetch(`${ADMIN_API_BASE_URL}/api/admin/session`, { credentials: 'include' })
      .then((response) => response.ok ? response.json() : null)
      .then((payload) => {
        if (payload && payload.authenticated) {
          location.replace('/admin');
        }
      })
      .catch(() => {});
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      background: #050505;
      color: #f7f7f7;
    }

    /* Subtle animated background */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 70% 20%, rgba(255, 150, 51, 0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 20% 80%, rgba(59, 130, 246, 0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .login-card {
      position: relative;
      z-index: 1;
      width: min(100% - 2rem, 400px);
      padding: 2.75rem 2.25rem;
      background: #0e0e14;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-top: 2px solid rgba(255, 150, 51, 0.5);
      border-radius: 20px;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 150, 51, 0.04);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      text-align: center;
    }

    .login-logo {
      width: 4rem;
      height: 4rem;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255, 150, 51, 0.3);
      margin-bottom: 0.25rem;
    }

    .login-logo-fallback {
      width: 4rem;
      height: 4rem;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff9633, #e07820);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.25rem;
      flex-shrink: 0;
    }

    .login-brand {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 150, 51, 0.8);
      margin: 0;
    }

    .login-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0.1rem 0 0;
      line-height: 1.2;
    }

    .login-subtitle {
      font-size: 0.88rem;
      color: rgba(247, 247, 247, 0.45);
      margin: 0 0 0.75rem;
    }

    .login-divider {
      width: 100%;
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
      margin: 0.25rem 0 0.75rem;
    }

    .login-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .input-label {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      text-align: left;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(247, 247, 247, 0.4);
    }

    .password-input-wrap {
      position: relative;
      width: 100%;
    }

    .login-form input[type="password"],
    .login-form input[type="text"] {
      width: 100%;
      padding: 0.85rem 4.5rem 0.85rem 1rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
      color: #f7f7f7;
      font: inherit;
      font-size: 1rem;
      letter-spacing: 0.12em;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .login-form input[type="password"]:focus,
    .login-form input[type="text"]:focus {
      outline: none;
      border-color: rgba(255, 150, 51, 0.55);
      box-shadow: 0 0 0 3px rgba(255, 150, 51, 0.1);
    }

    .password-visibility-btn {
      position: absolute;
      top: 50%;
      right: 0.65rem;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      color: rgba(247, 247, 247, 0.6);
      font: inherit;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0.35rem 0.45rem;
      border-radius: 6px;
      transition: color 0.2s, background-color 0.2s;
    }

    .password-visibility-btn:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
    }

    .password-visibility-btn:focus-visible {
      outline: 2px solid rgba(255, 150, 51, 0.45);
      outline-offset: 2px;
    }

    .login-btn {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #ff9633, #e07820);
      color: #fff;
      font: inherit;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      box-shadow: 0 6px 22px rgba(255, 150, 51, 0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s;
      letter-spacing: 0.02em;
    }

    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 30px rgba(255, 150, 51, 0.5);
    }

    .login-btn:active { transform: translateY(0); }

    .login-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .login-error {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border-radius: 8px;
      background: rgba(255, 80, 80, 0.1);
      border: 1px solid rgba(255, 80, 80, 0.25);
      color: #ff8080;
      font-size: 0.85rem;
      text-align: left;
      display: none;
    }

    .back-link {
      margin-top: 0.5rem;
      font-size: 0.82rem;
      color: rgba(247, 247, 247, 0.35);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover { color: rgba(247, 247, 247, 0.65); }
  </style>
</head>
<body>
  <div class="login-card">
    <img
      class="login-logo"
      src="../Assets/logo.jpeg"
      alt="ZiggyLabs Development"
      onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
    />
    <div class="login-logo-fallback" style="display:none;">Z</div>

    <p class="login-brand">ZiggyLabs Development</p>
    <h1 class="login-title">Admin Login</h1>
    <p class="login-subtitle">Restricted access. Enter your password to continue.</p>

    <hr class="login-divider" />

    <form class="login-form" id="login-form" autocomplete="off">
      <label class="input-label">
        Password
        <div class="password-input-wrap">
          <input
            type="password"
            id="login-pw"
            placeholder="Enter password"
            autocomplete="current-password"
            autofocus
            required
          />
          <button type="button" class="password-visibility-btn" id="pw-visibility-btn" aria-controls="login-pw" aria-pressed="false">Show</button>
        </div>
      </label>
      <p class="login-error" id="login-error">Please enter a password to continue.</p>
      <button type="submit" class="login-btn" id="login-btn">Sign In</button>
    </form>

    <a href="/" class="back-link">← Back to ZiggyLabs Development</a>
  </div>

  <script>
    const ADMIN_LOGIN_ENDPOINT = `${ADMIN_API_BASE_URL}/api/admin/login`;
    const passwordInput = document.getElementById('login-pw');
    const visibilityBtn = document.getElementById('pw-visibility-btn');

    visibilityBtn.addEventListener('click', function () {
      const isHidden = passwordInput.type === 'password';
      passwordInput.type = isHidden ? 'text' : 'password';
      visibilityBtn.textContent = isHidden ? 'Hide' : 'Show';
      visibilityBtn.setAttribute('aria-pressed', String(isHidden));
      passwordInput.focus({ preventScroll: true });
    });

    document.getElementById('login-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const pw = passwordInput.value.trim();
      const err = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');

      if (!pw) {
        err.style.display = 'block';
        return;
      }

      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const response = await fetch(ADMIN_LOGIN_ENDPOINT, {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw })
        });

        if (!response.ok) {
          throw new Error('Incorrect password.');
        }

        location.replace('/admin');
      } catch (error) {
        err.textContent = error.message || 'Could not sign in right now.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
